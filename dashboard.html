<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>青崇牧養儀表板</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    margin: 0; background: #e9ebef; color: #1f2328; font-size: 14px; }
  .wrap { max-width: 820px; margin: 0 auto; padding: 16px; }
  .head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .head h1 { font-size: 20px; font-weight: 500; margin: 0; }
  .wk { display: flex; align-items: center; gap: 6px; }
  .wk select { font-size: 13px; color: #b5651d; background: #fbeed3; border: none;
    border-radius: 8px; padding: 5px 8px; font-family: inherit; cursor: pointer; }
  .note { font-size: 12px; color: #9a9a96; margin: 0 0 16px; }
  .cards2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .mcard { background: #fff; border-radius: 12px; padding: 16px 18px; }
  .mcard .lab { font-size: 13px; color: #6b6b6b; }
  .mcard .num { font-size: 34px; font-weight: 500; color: #E8852C; margin-top: 4px; }
  .mcard .num small { font-size: 15px; color: #9a9a96; }
  .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 12px; font-size: 12px; color: #6b6b6b; }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .dot { width: 11px; height: 11px; border-radius: 3px; display: inline-block; }
  .pies { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .pie { background: #fff; border-radius: 12px; padding: 14px; }
  .pie .t { font-size: 13px; color: #6b6b6b; margin-bottom: 8px; }
  .pie .body { display: flex; align-items: center; gap: 12px; }
  .pie .leg { font-size: 12px; line-height: 1.9; }
  .trend { background: #fff; border-radius: 12px; padding: 14px; margin-bottom: 22px; }
  .trend .t { display: flex; justify-content: space-between; align-items: center;
    font-size: 13px; color: #6b6b6b; margin-bottom: 6px; }
  .tleg { display: flex; gap: 14px; font-size: 12px; }
  .tleg span { display: flex; align-items: center; gap: 4px; }
  .sect { font-size: 16px; font-weight: 500; margin: 0 0 10px; }
  .subnote { font-size: 12px; color: #9a9a96; margin: -6px 0 10px; }
  .grpgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .gblock { border-radius: 8px; overflow: hidden; border: 0.5px solid #e3e3e0; }
  .gblock .gh { color: #fff; font-size: 13px; padding: 6px 10px; }
  .gblock .gb { padding: 6px 10px; font-size: 13px; line-height: 2; }
  .gname { cursor: pointer; border-bottom: 1px dashed #b0b0aa; }
  .gname:hover { color: #E8852C; border-bottom-color: #E8852C; }
  .adult { border-radius: 8px; overflow: hidden; border: 0.5px solid #e3e3e0; margin-bottom: 22px; }
  .warn { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 22px; }
  .wcol { border: 0.5px dashed #cfcfca; border-radius: 8px; padding: 10px 6px; }
  .wcol .wh { font-size: 12px; margin-bottom: 6px; text-align: center; }
  .wname { display: flex; align-items: center; justify-content: space-between; gap: 4px;
    background: #fbeed3; border-radius: 6px; padding: 4px 7px; margin-bottom: 5px; font-size: 12px; }
  .wname .claim { font-size: 11px; color: #b5651d; cursor: pointer; white-space: nowrap; }
  .wname .by { font-size: 11px; color: #1f7a3d; white-space: nowrap; }
  .wacts { display: flex; align-items: center; gap: 5px; }
  .act { cursor: pointer; font-size: 13px; line-height: 1; padding: 1px 2px; }
  .act.rep { color: #8a5a00; }
  .act.cxl { color: #b3261e; }
  /* ── 關心回報彈窗 ── */
  #rpmask { position: fixed; inset: 0; background: rgba(31,35,40,.4); z-index: 60;
    display: none; align-items: flex-start; justify-content: center; }
  .rpcard { background: #fff; border-radius: 14px; padding: 20px 22px;
    width: min(430px, calc(100% - 32px)); margin-top: 12vh; }
  .rpcard h3 { margin: 0 0 4px; font-size: 16px; font-weight: 500; }
  .rphint { font-size: 12px; color: #9a9a96; margin: 0 0 10px; }
  .rpcard textarea { width: 100%; box-sizing: border-box; font-size: 15px; padding: 9px 10px;
    border: 0.5px solid #cfcfca; border-radius: 8px; font-family: inherit; resize: vertical; }
  .rpbtns { display: flex; gap: 10px; margin-top: 12px; }
  .rpcancel { flex: 1; padding: 10px; font-size: 14px; border: 0.5px solid #cfcfca;
    border-radius: 8px; background: #fff; color: #444; cursor: pointer; }
  .rpsend { flex: 2; padding: 10px; font-size: 14px; border: none; border-radius: 8px;
    background: #E8852C; color: #fff; cursor: pointer; }
  .rpsend:disabled { opacity: .5; }
  /* ── 公告區 / 回饋 ── */
  .bul { background: #fff; border-radius: 12px; padding: 12px 16px; margin-bottom: 20px; }
  .bul .bt { display: flex; justify-content: space-between; align-items: center;
    font-size: 13px; color: #6b6b6b; margin-bottom: 6px; }
  .bul .post { font-size: 12px; color: #185FA5; cursor: pointer; white-space: nowrap; }
  .bul-item { font-size: 13px; line-height: 1.8; }
  .bul-item .tag2 { display: inline-block; font-size: 11px; border-radius: 5px;
    padding: 1px 6px; margin-right: 5px; background: #eef4fb; color: #185FA5; }
  .bul-item .meta { color: #9a9a96; font-size: 12px; }
  .fbbox textarea { width: 100%; box-sizing: border-box; font-size: 14px; padding: 8px 10px;
    border: 0.5px solid #cfcfca; border-radius: 8px; font-family: inherit; resize: vertical; margin-top: 8px; }
  .fbbox .fbsend { margin-top: 8px; padding: 9px 18px; font-size: 14px; border: none;
    border-radius: 8px; background: #E8852C; color: #fff; cursor: pointer; }
  .fbbox .fbsend:disabled { opacity: .5; }
  .fbwarn { font-size: 11px; color: #b3261e; margin: 6px 0 0; }
  .blevel { width: 100%; font-size: 14px; padding: 8px 10px; border: 0.5px solid #cfcfca;
    border-radius: 8px; font-family: inherit; background: #fff; margin-bottom: 8px; }
  .empty { font-size: 13px; color: #9a9a96; text-align: center; }
  .rlabel { font-size: 13px; font-weight: 500; margin: 10px 0 6px; }
  .fb { border: 0.5px solid #e3e3e0; border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; background: #fff; }
  .fb .who { font-size: 13px; color: #6b6b6b; }
  .fb .txt { font-size: 14px; }
  .prgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .prcol { padding: 2px 0 2px 10px; }
  .prcol .rl { font-size: 13px; font-weight: 500; margin-bottom: 6px; }
  .prcol .pr { font-size: 13px; line-height: 1.7; margin-bottom: 5px; }
  .prcol .pr .g { color: #6b6b6b; }
  .center { text-align: center; color: #9a9a96; padding: 40px 16px; font-size: 15px; }
  .login { max-width: 380px; margin: 80px auto; background: #fff; border-radius: 14px;
    padding: 32px 28px; text-align: center; }
  .login h2 { font-size: 19px; font-weight: 500; margin: 0 0 6px; }
  .login p { font-size: 14px; color: #6b6b6b; margin: 4px 0 20px; }
  .login .gbtn { display: flex; justify-content: center; }
  .relogin { font-size: 13px; color: #185FA5; cursor: pointer; margin-top: 12px; display: inline-block; }
  /* ── 單組 / 單人 全螢幕頁 ── */
  #gpage, #ppage { position: fixed; inset: 0; background: #e9ebef; overflow-y: auto;
    z-index: 40; display: none; -webkit-overflow-scrolling: touch; }
  #ppage { z-index: 45; }
  .pname { cursor: pointer; border-bottom: 1px dashed #b0b0aa; }
  .pname:hover { color: #185FA5; border-bottom-color: #185FA5; }
  .htab { width: 100%; border-collapse: collapse; font-size: 13px; }
  .htab td { padding: 6px 4px; border-bottom: 0.5px solid #eee; }
  .htab tr:last-child td { border-bottom: none; }
  .htab td.d { color: #6b6b6b; white-space: nowrap; }
  .htab td.c { text-align: right; white-space: nowrap; }
  .gwrap { max-width: 640px; margin: 0 auto; padding: 16px; }
  .gtop { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .gtop .back { cursor: pointer; color: #185FA5; font-size: 15px; white-space: nowrap; }
  .gtop .gt { font-size: 17px; font-weight: 500; flex: 1; }
  .gtop select { font-size: 13px; color: #b5651d; background: #fbeed3; border: none;
    border-radius: 8px; padding: 5px 8px; font-family: inherit; cursor: pointer; }
  .gcard { background: #fff; border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; }
  .gmeta { font-size: 13px; color: #6b6b6b; }
  .g2 { display: flex; gap: 10px; margin-bottom: 12px; }
  .gstat { flex: 1; background: #fff; border-radius: 12px; padding: 12px 14px; }
  .gstat .lab { font-size: 12px; color: #6b6b6b; }
  .gstat .num { font-size: 26px; font-weight: 500; color: #E8852C; }
  .gstat .num small { font-size: 13px; color: #9a9a96; }
  .gsec { font-size: 14px; font-weight: 500; margin: 0 0 8px; }
  .mtab { width: 100%; border-collapse: collapse; font-size: 14px; }
  .mtab td { padding: 7px 4px; border-bottom: 0.5px solid #eee; }
  .mtab tr:last-child td { border-bottom: none; }
  .mtab td.stc { text-align: right; white-space: nowrap; }
  .st { display: inline-block; font-size: 12px; border-radius: 6px; padding: 2px 8px; white-space: nowrap; }
  .st.ok2 { background: #e6f3ea; color: #1f7a3d; }
  .st.amber { background: #fbeed3; color: #8a5a00; }
  .st.red { background: #fbe3e0; color: #b3261e; }
  .st.gray { background: #eee; color: #8a8a86; }
  .gline { font-size: 13px; line-height: 1.9; }
  .gline .lb { color: #6b6b6b; }
  /* ── A 未回報 / B 新朋友 / C 需關注 ── */
  .alert { background: #fff6f2; border: 1px solid #f2c9b3; border-radius: 12px; padding: 12px 16px; margin-bottom: 16px; }
  .arow { display: flex; align-items: baseline; gap: 8px; font-size: 13px; line-height: 2.1; flex-wrap: wrap; }
  .arow .rea { color: #b3261e; font-size: 12px; }
  .cardlite { background: #fff; border-radius: 12px; padding: 12px 16px; margin-bottom: 16px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .chipg { background: #f2f2ef; border-radius: 6px; padding: 3px 9px; font-size: 13px; }
  .vtab { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 4px; }
  .vtab td { padding: 6px 4px; border-bottom: 0.5px solid #eee; }
  .vtab tr:last-child td { border-bottom: none; }
  .vtab td.r { text-align: right; white-space: nowrap; color: #6b6b6b; }
  .vtab .stale { color: #b3261e; font-weight: 500; }
  .okline { font-size: 13px; color: #1f7a3d; }
  .lrow { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 6px 0; border-bottom: 0.5px solid #eee; }
  .lrow .lg { font-size: 14px; }
  .lcopy { font-size: 12px; border: 0.5px solid #185FA5; color: #185FA5; background: #fff;
    border-radius: 6px; padding: 4px 10px; cursor: pointer; white-space: nowrap; }
</style>
</head>
<body>
<div class="wrap">
  <div id="login" class="login" style="display:none">
    <h2>青崇牧養儀表板</h2>
    <p>請用教會 Google 帳號登入</p>
    <div class="gbtn"><div id="gbtn"></div></div>
  </div>
  <div id="loading" class="center" style="display:none">讀取儀表板中…</div>
  <div id="app" style="display:none"></div>
</div>

<div id="gpage"><div class="gwrap">
  <div class="gtop">
    <span class="back" onclick="closeGroup()">‹ 返回</span>
    <span class="gt" id="gtitle"></span>
    <select id="gwksel" style="display:none"></select>
  </div>
  <div id="gbody"></div>
</div></div>

<div id="ppage"><div class="gwrap">
  <div class="gtop">
    <span class="back" onclick="closePerson()">‹ 返回</span>
    <span class="gt" id="ptitle"></span>
  </div>
  <div id="pbody"></div>
</div></div>

<div id="rpmask"><div class="rpcard">
  <h3>關心回報 · <span id="rpwho"></span></h3>
  <p class="rphint">會寫進「牧養紀錄」表，成為這位的牧養歷程。單組頁可查看歷史。</p>
  <textarea id="rptext" rows="4" placeholder="例如：已透過 LINE 關心，家裡最近有些狀況，約好下週見面聊…"></textarea>
  <div class="rpbtns">
    <button type="button" class="rpcancel" onclick="closeReport()">取消</button>
    <button type="button" class="rpsend" id="rpsend" onclick="sendReport()">送出回報</button>
  </div>
</div></div>

<div id="bmask" style="position:fixed;inset:0;background:rgba(31,35,40,.4);z-index:60;display:none;align-items:flex-start;justify-content:center"><div class="rpcard">
  <h3>發公告給組長</h3>
  <p class="rphint">公告會出現在組長填報表單的公佈欄，顯示 30 天。</p>
  <select id="blevel" class="blevel">
    <option value="全體">📢 全體（所有小組）</option>
    <option value="國中">國中區</option>
    <option value="高中">高中區</option>
    <option value="大專">大專區</option>
    <option value="社青">社青區</option>
  </select>
  <textarea id="btext" rows="4" placeholder="例如：下週六合併聚會，請各組提前 15 分鐘集合…"></textarea>
  <p class="fbwarn">⚠️ 組長表單是公開連結，內容視同所有同工可見。</p>
  <div class="rpbtns">
    <button type="button" class="rpcancel" onclick="closeBulletin()">取消</button>
    <button type="button" class="rpsend" id="bsend" onclick="sendBulletin()">發佈公告</button>
  </div>
</div></div>

<div id="lmask" style="position:fixed;inset:0;background:rgba(31,35,40,.4);z-index:60;display:none;align-items:flex-start;justify-content:center"><div class="rpcard" style="max-height:80vh;overflow-y:auto">
  <h3>組長專屬連結</h3>
  <p class="rphint">每組一條專屬網址，發給該組組長（可加到手機主畫面）。組長用它看自己組的儀表板與你的私訊，零登入。連結請私下發、勿貼公開群組。</p>
  <div id="llist"><div class="empty">讀取中…</div></div>
  <div class="rpbtns"><button type="button" class="rpcancel" onclick="closeLinks()">關閉</button></div>
</div></div>

<script>
  // Google Cloud OAuth 用戶端 ID
  var GOOGLE_CLIENT_ID = '1095635558874-n30r82tbdbslcvli54759h29n3tu4sa6.apps.googleusercontent.com';
  var API_URL = 'https://script.google.com/macros/s/AKfycbzvOJKph1-Ru8bsC2u1o8EpNQ4zLHMnoqsuotintTQDM4KTR2cK5zjoaGfGSzBRcLOBqQ/exec';

  var COLORS = { '國中': '#378ADD', '高中': '#1D9E75', '大專': '#E8852C', '社青': '#7F77DD', '成人社青': '#C2557A' };
  var QC = ['國中', '高中', '大專', '社青'];
  var TOKEN = '';
  var CURWEEK = '';   // 目前檢視的週（週六日期）
  var GCUR = null;    // 目前開啟的單組 {region, group}

  function show(id) { ['login', 'loading', 'app'].forEach(function (x) { document.getElementById(x).style.display = (x === id ? 'block' : 'none'); }); }

  function initGsi() {
    if (!GOOGLE_CLIENT_ID) { document.getElementById('login').innerHTML = '<h2>尚未設定登入</h2><p>請先在 dashboard.html 與 Code.gs 填入 GOOGLE_CLIENT_ID。</p>'; show('login'); return; }
    google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: onSignIn });
    google.accounts.id.renderButton(document.getElementById('gbtn'), { theme: 'filled_blue', size: 'large', text: 'signin_with', shape: 'pill' });
    show('login');
  }

  function onSignIn(resp) {
    TOKEN = resp.credential;
    load('');
  }

  function load(week) {
    show('loading');
    api('dashboard', { token: TOKEN, week: week || '' }).then(render).catch(function (e) {
      document.getElementById('loading').textContent = '讀取失敗：' + e.message;
    });
  }

  function api(action, payload) {
    return fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: action, payload: payload || null }) })
      .then(function (r) { return r.json(); })
      .then(function (res) { if (res && res.error) throw new Error(res.error); return res.data; });
  }

  function esc(s) { return String(s == null ? '' : s).replace(/[&<>]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]; }); }

  function weekLabel(w, latest) { return w + (w === latest ? '（最新）' : ''); }

  function donut(total, segs) {
    var r = 34, circ = 2 * Math.PI * r, off = 0, s = '';
    segs.forEach(function (seg) {
      var len = total > 0 ? seg.value / total * circ : 0;
      s += '<circle cx="45" cy="45" r="' + r + '" fill="none" stroke="' + seg.color + '" stroke-width="14" stroke-dasharray="'
        + len.toFixed(1) + ' ' + (circ - len).toFixed(1) + '" stroke-dashoffset="' + (-off).toFixed(1) + '" transform="rotate(-90 45 45)"/>';
      off += len;
    });
    return '<svg viewBox="0 0 90 90" width="96" height="96"><g>' + s + '</g>'
      + '<text x="45" y="42" text-anchor="middle" font-size="15" font-weight="500" fill="#1f2328">' + total + '</text>'
      + '<text x="45" y="55" text-anchor="middle" font-size="9" fill="#9a9a96">總人數</text></svg>';
  }

  function pieBlock(title, byRegion, total) {
    var segs = QC.map(function (d) { return { value: byRegion[d] || 0, color: COLORS[d] }; });
    var leg = QC.map(function (d) {
      var v = byRegion[d] || 0, pct = total > 0 ? Math.round(v / total * 100) : 0;
      return '<div><span style="color:' + COLORS[d] + '">●</span> ' + d + ' ' + v + '（' + pct + '%）</div>';
    }).join('');
    return '<div class="pie"><div class="t">' + title + '</div><div class="body">' + donut(total, segs) + '<div class="leg">' + leg + '</div></div></div>';
  }

  // ── 跨週折線圖：rows 舊→新，series [{key,label,color}]，最多取最後 12 週 ──
  function lineChart(rows, series) {
    var data = (rows || []).slice(-12);
    if (data.length < 2) return '<p class="empty" style="padding:14px 0">資料滿兩週後會出現趨勢線（目前 ' + data.length + ' 週）</p>';
    var W = 640, H = 180, padL = 20, padR = 20, padT = 22, padB = 26;
    var maxY = 1;
    series.forEach(function (sr) { data.forEach(function (r) { maxY = Math.max(maxY, r[sr.key] || 0); }); });
    var iw = (W - padL - padR) / (data.length - 1);
    function X(i) { return padL + i * iw; }
    function Y(v) { return padT + (H - padT - padB) * (1 - v / maxY); }
    var s = '';
    data.forEach(function (r, i) {
      var lab = r.week.slice(5).replace('-', '/');
      s += '<text x="' + X(i).toFixed(1) + '" y="' + (H - 8) + '" text-anchor="middle" font-size="10" fill="#9a9a96">' + lab + '</text>';
      s += '<line x1="' + X(i).toFixed(1) + '" y1="' + padT + '" x2="' + X(i).toFixed(1) + '" y2="' + (H - padB) + '" stroke="#f0f0ee" stroke-width="1"/>';
    });
    series.forEach(function (sr) {
      var pts = data.map(function (r, i) { return X(i).toFixed(1) + ',' + Y(r[sr.key] || 0).toFixed(1); }).join(' ');
      s += '<polyline points="' + pts + '" fill="none" stroke="' + sr.color + '" stroke-width="2"/>';
      data.forEach(function (r, i) {
        var v = r[sr.key] || 0;
        s += '<circle cx="' + X(i).toFixed(1) + '" cy="' + Y(v).toFixed(1) + '" r="3" fill="' + sr.color + '"/>'
          + '<text x="' + X(i).toFixed(1) + '" y="' + (Y(v) - 7).toFixed(1) + '" text-anchor="middle" font-size="10" fill="' + sr.color + '">' + v + '</text>';
      });
    });
    return '<svg viewBox="0 0 ' + W + ' ' + H + '" style="width:100%;height:auto;display:block">' + s + '</svg>';
  }

  function render(d) {
    if (d.denied) {
      document.getElementById('login').innerHTML = '<h2>無權限查看</h2>'
        + '<p>這個儀表板僅開放給青崇傳道團隊。<br>你登入的帳號：' + esc(d.me || '（未取得）') + '</p>'
        + '<span class="relogin" onclick="switchAccount()">換一個帳號登入</span>';
      show('login');
      return;
    }
    show('app');
    CURWEEK = d.week || '';
    var latest = (d.weeks && d.weeks[0]) || '';
    var app = document.getElementById('app');
    var h = '';
    var opts = (d.weeks || []).map(function (w) {
      return '<option value="' + w + '"' + (w === CURWEEK ? ' selected' : '') + '>' + weekLabel(w, latest) + '</option>';
    }).join('');
    h += '<div class="head"><h1>青崇牧養儀表板</h1><span class="wk">週次 <select id="wksel">' + opts + '</select></span></div>';
    h += '<p class="note">一週＝週二～下週一（涵蓋週二、週五小組與週六青崇）。青崇人數只含國中／高中／大專／社青；成人社青另計。已回報 ' + d.reported + ' 組。點小組名稱可看該組完整回報。　<span class="post" onclick="openLinks()">🔗 組長連結</span></p>';

    var buls = d.bulletins || [];
    h += '<div class="bul"><div class="bt"><span>📢 公告（組長公佈欄 · 顯示 30 天）</span><span class="post" onclick="openBulletin()">＋ 發公告</span></div>';
    h += buls.length ? buls.map(function (b) {
      var tag = b.level === '全體' ? '全體' : b.district + '區';
      return '<div class="bul-item"><span class="tag2">' + esc(tag) + '</span>' + esc(b.text)
        + '　<span class="meta">' + esc(b.time) + ' · ' + esc(b.by) + '</span></div>';
    }).join('') : '<div class="bul-item" style="color:#9a9a96">目前沒有進行中的公告</div>';
    h += '</div>';

    // C) 本週需要關注的組（未回報／連缺／出席下降）
    var att = d.attention || [];
    if (att.length) {
      h += '<div class="alert"><div class="sect" style="margin-bottom:6px">🔔 本週需要關注（' + att.length + ' 組）</div>';
      att.forEach(function (a) {
        h += '<div class="arow"><span class="gname" data-region="' + a.region + '" data-group="' + esc(a.group) + '">'
          + a.region + ' · ' + esc(a.group) + '</span><span class="rea">' + esc(a.reasons.join('・')) + '</span></div>';
      });
      h += '</div>';
    }

    // A) 未交回報催交清單
    var nr = d.notReported || [];
    h += '<div class="cardlite"><div class="sect" style="margin-bottom:6px">📋 未交回報（' + nr.length + ' / ' + (d.groupsTotal || 0) + ' 組）</div>';
    h += nr.length
      ? '<div class="chips">' + nr.map(function (x) { return '<span class="chipg">' + x.region + '·' + esc(x.group) + '</span>'; }).join('') + '</div>'
      : '<div class="okline">✓ 這週所有組都交回報了</div>';
    h += '</div>';

    h += '<div class="cards2">'
      + '<div class="mcard"><div class="lab">青崇崇拜總人數</div><div class="num">' + d.worship.total + ' <small>人</small></div></div>'
      + '<div class="mcard"><div class="lab">小組出席總人數</div><div class="num">' + d.group.total + ' <small>人</small></div></div></div>';
    h += '<div class="legend">' + QC.concat(['成人社青']).map(function (r) {
      return '<span><span class="dot" style="background:' + COLORS[r] + '"></span>' + r + (r === '成人社青' ? '（另計）' : '') + '</span>';
    }).join('') + '</div>';
    h += '<div class="pies">' + pieBlock('青崇各區人數分佈', d.worship.byRegion, d.worship.total)
      + pieBlock('小組各區人數分佈', d.group.byRegion, d.group.total) + '</div>';

    h += '<div class="trend"><div class="t"><span>跨週趨勢 · 每週人數</span>'
      + '<span class="tleg"><span><span class="dot" style="background:#E8852C"></span>崇拜</span>'
      + '<span><span class="dot" style="background:#378ADD"></span>小組</span></span></div>'
      + lineChart(d.trend, [{ key: 'worship', color: '#E8852C' }, { key: 'group', color: '#378ADD' }])
      + '</div>';

    h += '<p class="sect">當週各小組人數</p><div class="grpgrid">';
    QC.forEach(function (r) {
      var list = d.perGroup[r] || [], sum = list.reduce(function (s, g) { return s + g.n; }, 0);
      var rows = list.length ? list.map(function (g) {
        return '<span class="gname" data-region="' + r + '" data-group="' + esc(g.group) + '">' + esc(g.group) + ' ' + g.n + '</span>';
      }).join('　·　') : '尚無回報';
      h += '<div class="gblock"><div class="gh" style="background:' + COLORS[r] + '">' + r + '　' + sum + ' 人</div><div class="gb">' + rows + '</div></div>';
    });
    h += '</div>';
    var aList = d.adultGroups || [];
    var aRows = aList.length ? aList.map(function (g) {
      return '<span class="gname" data-region="成人社青" data-group="' + esc(g.group) + '">' + esc(g.group) + ' ' + g.n + '</span>';
    }).join('　·　') : '尚無回報';
    h += '<div class="adult"><div class="gh" style="background:' + COLORS['成人社青'] + ';color:#fff;font-size:13px;padding:6px 10px">成人社青　' + (d.adult.group || 0) + ' 人　<span style="opacity:.85">· 另計、不入青崇總數</span></div><div class="gb" style="padding:6px 10px;font-size:13px;line-height:2">' + aRows + '</div></div>';

    h += '<p class="sect">警示名單 · 連續兩週缺席</p><p class="subnote">小組連續 2 次「不明缺席」者（以檢視週為時間點）。</p><div class="warn">';
    QC.concat(['成人社青']).forEach(function (r) {
      var list = d.absentees[r] || [];
      var inner = list.length ? list.map(function (p) {
        return '<div class="wname">' + wnameInner(p) + '</div>';
      }).join('') : '<div class="empty">—</div>';
      h += '<div class="wcol"><div class="wh" style="color:' + COLORS[r] + '">' + r + '</div>' + inner + '</div>';
    });
    h += '</div>';

    // B) 新朋友跟進追蹤
    var vis = d.visitors || [];
    h += '<p class="sect">🌱 新朋友跟進追蹤</p><p class="subnote">仍在追蹤的新朋友，距最後出席越久越需要主動關心。</p>';
    if (vis.length) {
      h += '<div class="cardlite" style="padding:6px 16px"><table class="vtab">';
      vis.forEach(function (v) {
        var stale = v.days != null && v.days >= 21;
        var ago = v.days == null ? '—' : (v.days === 0 ? '本週' : v.days + ' 天前');
        h += '<tr><td>' + esc(v.name) + (v.inviter ? ' <span style="color:#9a9a96">· ' + esc(v.inviter) + ' 邀</span>' : '') + '</td>'
          + '<td class="r">' + esc(v.region) + '·' + esc(v.group) + '</td>'
          + '<td class="r">累積 ' + v.count + ' 次</td>'
          + '<td class="r' + (stale ? ' stale' : '') + '">' + ago + '</td></tr>';
      });
      h += '</table></div>';
    } else {
      h += '<div class="cardlite"><div class="okline" style="color:#9a9a96">目前沒有在追蹤的新朋友</div></div>';
    }

    h += '<p class="sect">小組近況與回饋</p>';
    QC.concat(['成人社青']).forEach(function (r) {
      var list = d.feedback[r] || [];
      if (!list.length) return;
      h += '<div class="rlabel" style="color:' + COLORS[r] + '">' + r + '</div>';
      list.forEach(function (f) {
        h += '<div class="fb"><span class="who">' + esc(f.group) + (f.leader ? ' · ' + esc(f.leader) : '') + '　</span><span class="txt">' + esc(f.text) + '</span></div>';
      });
    });

    h += '<p class="sect" style="margin-top:18px">代禱事項 · 全部列出</p><div class="prgrid">';
    QC.concat(['成人社青']).forEach(function (r) {
      var list = d.prayer[r] || [];
      var rows = list.length ? list.map(function (p) {
        return '<div class="pr"><span class="g">' + esc(p.group) + '：</span>' + esc(p.text) + '</div>';
      }).join('') : '<div class="pr" style="color:#9a9a96">尚無</div>';
      h += '<div class="prcol" style="border-left:3px solid ' + COLORS[r] + '"><div class="rl" style="color:' + COLORS[r] + '">' + r + '</div>' + rows + '</div>';
    });
    h += '</div>';

    app.innerHTML = h;

    document.getElementById('wksel').addEventListener('change', function () { load(this.value); });
    document.querySelectorAll('.gname').forEach(function (el) {
      el.addEventListener('click', function () { openGroup(el.dataset.region, el.dataset.group, CURWEEK); });
    });
    bindCare(app);
    bindPerson(app);
  }

  // ── 警示名單的 認領 / 取消 / 回報 ─────────────────────
  function wnameInner(p) {
    var h = '<span class="pname" data-id="' + esc(p.id) + '" data-name="' + esc(p.name) + '">' + esc(p.name) + '</span>';
    if (p.claimedBy) {
      h += '<span class="wacts"><span class="by">✓ ' + esc(p.claimedBy) + '</span>'
        + '<span class="act rep" data-id="' + esc(p.id) + '" data-name="' + esc(p.name) + '" title="寫關心回報">✎</span>'
        + (p.mine ? '<span class="act cxl" data-id="' + esc(p.id) + '" data-name="' + esc(p.name) + '" title="取消認領">✕</span>' : '')
        + '</span>';
    } else {
      h += '<span class="claim" data-id="' + esc(p.id) + '" data-name="' + esc(p.name) + '">我來關心</span>';
    }
    return h;
  }

  function bindCare(root) {
    root.querySelectorAll('.claim').forEach(function (b) {
      b.addEventListener('click', function () {
        var id = b.dataset.id, name = b.dataset.name, w = b.closest('.wname');
        b.textContent = '認領中…';
        api('claimCare', { token: TOKEN, personId: id, personName: name }).then(function (res) {
          w.innerHTML = wnameInner({ id: id, name: name, claimedBy: res.by, mine: true });
          bindCare(w); bindPerson(w);
        }).catch(function (e) { b.textContent = '我來關心'; alert('認領失敗：' + e.message); });
      });
    });
    root.querySelectorAll('.act.rep').forEach(function (b) {
      b.addEventListener('click', function () { openReport(b.dataset.id, b.dataset.name); });
    });
    root.querySelectorAll('.act.cxl').forEach(function (b) {
      b.addEventListener('click', function () {
        if (!confirm('取消對「' + b.dataset.name + '」的認領？')) return;
        var id = b.dataset.id, name = b.dataset.name, w = b.closest('.wname');
        api('cancelCare', { token: TOKEN, personId: id }).then(function () {
          w.innerHTML = wnameInner({ id: id, name: name, claimedBy: '' });
          bindCare(w); bindPerson(w);
        }).catch(function (e) { alert('取消失敗：' + e.message); });
      });
    });
  }

  // ── 關心回報彈窗 ─────────────────────────────────────
  var RP = null;
  function openReport(id, name) {
    RP = { id: id, name: name };
    document.getElementById('rpwho').textContent = name;
    document.getElementById('rptext').value = '';
    document.getElementById('rpmask').style.display = 'flex';
    document.getElementById('rptext').focus();
  }
  function closeReport() {
    document.getElementById('rpmask').style.display = 'none';
    RP = null;
  }
  function sendReport() {
    if (!RP) return;
    var t = document.getElementById('rptext').value.trim();
    if (!t) { alert('請填寫關心的內容'); return; }
    var btn = document.getElementById('rpsend');
    btn.disabled = true; btn.textContent = '送出中…';
    api('careReport', { token: TOKEN, personId: RP.id, personName: RP.name, text: t })
      .then(function () { btn.disabled = false; btn.textContent = '送出回報'; closeReport(); })
      .catch(function (e) { btn.disabled = false; btn.textContent = '送出回報'; alert('送出失敗：' + e.message); });
  }

  // ── 發公告彈窗（全體 / 牧區）───────────────────────────
  function openBulletin() {
    document.getElementById('btext').value = '';
    document.getElementById('bmask').style.display = 'flex';
    document.getElementById('btext').focus();
  }
  function closeBulletin() { document.getElementById('bmask').style.display = 'none'; }
  function sendBulletin() {
    var t = document.getElementById('btext').value.trim();
    if (!t) { alert('請填寫公告內容'); return; }
    var lv = document.getElementById('blevel').value;
    var payload = lv === '全體'
      ? { token: TOKEN, level: '全體', text: t }
      : { token: TOKEN, level: '牧區', district: lv, text: t };
    var btn = document.getElementById('bsend');
    btn.disabled = true; btn.textContent = '發佈中…';
    api('postBulletin', payload)
      .then(function () { btn.disabled = false; btn.textContent = '發佈公告'; closeBulletin(); load(CURWEEK); })
      .catch(function (e) { btn.disabled = false; btn.textContent = '發佈公告'; alert('發佈失敗：' + e.message); });
  }

  // ── 組長專屬連結彈窗 ─────────────────────────────────
  function openLinks() {
    document.getElementById('lmask').style.display = 'flex';
    document.getElementById('llist').innerHTML = '<div class="empty">讀取中…</div>';
    api('leaderLinks', { token: TOKEN }).then(function (list) {
      if (!list || !list.length) { document.getElementById('llist').innerHTML = '<div class="empty">還沒有連結。請先在 Apps Script 執行一次 initLeaderTokens 產生各組通行碼。</div>'; return; }
      var byR = {};
      list.forEach(function (x) { (byR[x.region] = byR[x.region] || []).push(x); });
      var h = '';
      QC.concat(['成人社青']).forEach(function (r) {
        var arr = byR[r]; if (!arr || !arr.length) return;
        h += '<div class="rlabel" style="color:' + (COLORS[r] || '#444') + '">' + r + '</div>';
        arr.forEach(function (x) {
          h += '<div class="lrow"><span class="lg">' + esc(x.group) + '</span>'
            + '<button type="button" class="lcopy" data-url="' + esc(x.url) + '">複製連結</button></div>';
        });
      });
      document.getElementById('llist').innerHTML = h;
      document.querySelectorAll('.lcopy').forEach(function (b) {
        b.addEventListener('click', function () {
          var url = b.dataset.url;
          navigator.clipboard.writeText(url).then(function () {
            b.textContent = '已複製 ✓'; setTimeout(function () { b.textContent = '複製連結'; }, 1500);
          }).catch(function () { prompt('複製這條連結：', url); });
        });
      });
    }).catch(function (e) { document.getElementById('llist').innerHTML = '<div class="empty">讀取失敗：' + esc(e.message) + '</div>'; });
  }
  function closeLinks() { document.getElementById('lmask').style.display = 'none'; }

  // ── 單組全螢幕頁 ─────────────────────────────────────
  function openGroup(region, group, week) {
    GCUR = { region: region, group: group };
    document.getElementById('gpage').style.display = 'block';
    document.body.style.overflow = 'hidden';
    document.getElementById('gtitle').textContent = region + ' · ' + group;
    document.getElementById('gwksel').style.display = 'none';
    document.getElementById('gbody').innerHTML = '<div class="center">讀取中…</div>';
    api('groupReport', { token: TOKEN, region: region, group: group, week: week || '' })
      .then(renderGroup)
      .catch(function (e) { document.getElementById('gbody').innerHTML = '<div class="center">讀取失敗：' + esc(e.message) + '</div>'; });
  }

  function closeGroup() {
    document.getElementById('gpage').style.display = 'none';
    document.body.style.overflow = '';
    GCUR = null;
  }

  // ── 個人牧養歷程單人頁 ───────────────────────────────
  function bindPerson(root) {
    root.querySelectorAll('.pname').forEach(function (el) {
      el.addEventListener('click', function (ev) {
        ev.stopPropagation();
        openPerson(el.dataset.id, el.dataset.name);
      });
    });
  }
  function openPerson(id, name) {
    if (!id) return;
    document.getElementById('ppage').style.display = 'block';
    document.body.style.overflow = 'hidden';
    document.getElementById('ptitle').textContent = name || '';
    document.getElementById('pbody').innerHTML = '<div class="center">讀取中…</div>';
    api('personReport', { token: TOKEN, personId: id })
      .then(renderPerson)
      .catch(function (e) { document.getElementById('pbody').innerHTML = '<div class="center">讀取失敗：' + esc(e.message) + '</div>'; });
  }
  function closePerson() {
    document.getElementById('ppage').style.display = 'none';
    if (document.getElementById('gpage').style.display !== 'block') document.body.style.overflow = '';
  }
  function renderPerson(d) {
    var body = document.getElementById('pbody');
    if (!d || d.empty) { body.innerHTML = '<div class="center">查無這個人的資料</div>'; return; }
    document.getElementById('ptitle').textContent = (d.region ? d.region + ' · ' : '') + (d.group ? d.group + ' · ' : '') + (d.name || '');
    var h = '';
    h += '<div class="gcard gmeta">' + esc(d.region || '') + (d.group ? ' · ' + esc(d.group) : '')
      + (d.claimedBy ? '　·　<span style="color:#1f7a3d">關心中：' + esc(d.claimedBy) + '</span>' : '') + '</div>';
    h += '<div class="gcard"><div class="gsec">牧養歷程 · 認領與關心紀錄</div>';
    if ((d.careLog || []).length) {
      d.careLog.forEach(function (c) {
        var body_ = c.action === '關心回報' ? esc(c.text) : '<span class="lb">【' + esc(c.action) + '】</span>';
        h += '<div class="gline"><span class="lb">' + esc(c.time) + '　' + esc(c.by) + '：</span>' + body_ + '</div>';
      });
    } else { h += '<div class="gline lb">還沒有牧養紀錄</div>'; }
    h += '</div>';
    h += '<div class="gcard"><div class="gsec">出席歷程（近 ' + (d.history || []).length + ' 次）</div><table class="htab">';
    (d.history || []).forEach(function (r) {
      h += '<tr><td class="d">' + esc(r.date) + '</td><td class="c">崇拜 ' + chip(r.cong) + '</td><td class="c">小組 ' + chip(r.grp) + '</td></tr>';
    });
    h += '</table></div>';
    body.innerHTML = h;
    document.getElementById('ppage').scrollTop = 0;
  }

  function chip(st) {
    if (!st) return '<span class="st gray">—</span>';
    var t = st.status, note = st.note || '';
    if (t === '出席') return '<span class="st ok2">✓ 出席</span>';
    if (t === '請假') return '<span class="st amber">' + (note.indexOf('生病') >= 0 ? '生病' : '請假') + '</span>';
    if (t === '補習') return '<span class="st amber">補習</span>';
    if (t === '外地') return '<span class="st gray">外地</span>';
    return '<span class="st red">不明缺席</span>';
  }

  function renderGroup(d) {
    var body = document.getElementById('gbody');
    if (d.empty) { body.innerHTML = '<div class="center">這一組還沒有任何回報資料</div>'; return; }

    var sel = document.getElementById('gwksel');
    var latest = (d.weeks && d.weeks[0]) || '';
    sel.innerHTML = (d.weeks || []).map(function (w) {
      return '<option value="' + w + '"' + (w === d.week ? ' selected' : '') + '>' + weekLabel(w, latest) + '</option>';
    }).join('');
    sel.style.display = 'inline-block';
    sel.onchange = function () { openGroup(GCUR.region, GCUR.group, this.value); };

    var congIn = 0, grpIn = 0;
    (d.members || []).forEach(function (m) {
      if (m.cong && m.cong.status === '出席') congIn++;
      if (m.grp && m.grp.status === '出席') grpIn++;
    });
    var tot = (d.members || []).length;

    var h = '';
    h += '<div class="gcard gmeta">填報者：' + esc(d.leader || '—') + (d.time ? '　·　填報時間：' + esc(d.time) : '') + '</div>';
    h += '<div class="g2">'
      + '<div class="gstat"><div class="lab">崇拜出席</div><div class="num">' + congIn + '<small>/' + tot + '</small></div></div>'
      + '<div class="gstat"><div class="lab">小組出席</div><div class="num">' + grpIn + '<small>/' + tot + '</small></div></div></div>';

    h += '<div class="gcard"><div class="gsec" style="display:flex;justify-content:space-between"><span>這組的跨週趨勢</span>'
      + '<span class="tleg" style="font-weight:normal"><span><span class="dot" style="background:#E8852C"></span>崇拜</span>'
      + '<span><span class="dot" style="background:#378ADD"></span>小組</span></span></div>'
      + lineChart(d.trend, [{ key: 'cong', color: '#E8852C' }, { key: 'grp', color: '#378ADD' }]) + '</div>';

    h += '<div class="gcard"><div class="gsec">逐人出席（' + esc(d.week) + ' 那週）<span class="lb" style="font-weight:normal;font-size:12px">· 點名字看個人牧養歷程</span></div><table class="mtab">';
    (d.members || []).forEach(function (m) {
      h += '<tr><td><span class="pname" data-id="' + esc(m.id) + '" data-name="' + esc(m.name) + '">' + esc(m.name) + '</span></td><td class="stc">崇拜 ' + chip(m.cong) + '</td><td class="stc">小組 ' + chip(m.grp) + '</td></tr>';
    });
    h += '</table></div>';

    if ((d.serving || []).length) {
      h += '<div class="gcard"><div class="gsec">當週服事</div><div class="gline">'
        + d.serving.map(function (s) { return '<span class="lb">' + esc(s.role) + '：</span>' + esc(s.name); }).join('　·　')
        + '</div></div>';
    }

    h += '<div class="gcard"><div class="gsec">本週回饋</div><div class="gline">' + (d.feedback ? esc(d.feedback) : '<span class="lb">（未填）</span>') + '</div></div>';
    h += '<div class="gcard"><div class="gsec">代禱事項</div><div class="gline">' + (d.prayer ? esc(d.prayer) : '<span class="lb">（未填）</span>') + '</div></div>';

    if ((d.newFriends || []).length || (d.returning || []).length) {
      h += '<div class="gcard"><div class="gsec">新朋友</div><div class="gline">';
      (d.newFriends || []).forEach(function (n) {
        h += '<div>🆕 ' + esc(n.name) + (n.inviter ? '<span class="lb">（' + esc(n.inviter) + ' 邀請）</span>' : '') + (n.note ? '<span class="lb"> · ' + esc(n.note) + '</span>' : '') + '</div>';
      });
      (d.returning || []).forEach(function (n) {
        h += '<div>🔁 ' + esc(n.name) + '<span class="lb">（回訪 · 累積 ' + n.count + ' 次）</span></div>';
      });
      h += '</div></div>';
    }

    if ((d.careLog || []).length) {
      h += '<div class="gcard"><div class="gsec">牧養紀錄 · 傳道關心歷程</div>';
      d.careLog.forEach(function (c) {
        var body_ = c.action === '關心回報' ? esc(c.text) : '<span class="lb">【' + esc(c.action) + '】</span>';
        h += '<div class="gline"><span class="lb">' + esc(c.time) + '　' + esc(c.by) + ' → ' + esc(c.name) + '：</span>' + body_ + '</div>';
      });
      h += '</div>';
    }

    h += '<div class="gcard fbbox"><div class="gsec">💬 給這組的回饋（組長打開表單、選到這組時會看到）</div>';
    (d.bulletins || []).forEach(function (b) {
      h += '<div class="gline"><span class="lb">' + esc(b.time) + '　' + esc(b.by) + '：</span>' + esc(b.text) + '</div>';
    });
    h += '<textarea id="gfbtext" rows="3" placeholder="例如：謝謝你們用心接待新朋友，這週的回饋讀到很受激勵…"></textarea>'
      + '<p class="fbwarn">⚠️ 組長表單是公開連結，內容視同所有同工可見；個別組員的敏感個案請走私訊。</p>'
      + '<button type="button" class="fbsend" id="gfbsend">送出回饋</button></div>';

    // 🔒 私訊組長：只在組長端儀表板（有通行碼認證）顯示，永不進公開填報表
    h += '<div class="gcard fbbox" style="border:1px solid #f0dcc0;background:#fdf9f2">'
      + '<div class="gsec">🔒 私訊組長（只有本組組長在他的儀表板看得到）</div>';
    (d.dms || []).forEach(function (b) {
      h += '<div class="gline"><span class="lb">' + esc(b.time) + '　' + esc(b.by) + '：</span>' + esc(b.text) + '</div>';
    });
    h += '<textarea id="gdmtext" rows="3" placeholder="例如：曉琪家裡最近有狀況，你先不用追她點名，我私下在跟…"></textarea>'
      + '<p class="fbwarn" style="color:#8a5a00">🔒 這則只有這組組長看得到，不會出現在公開填報表，可以寫個別關懷。</p>'
      + '<button type="button" class="fbsend" id="gdmsend" style="background:#b5651d">送出私訊</button></div>';

    body.innerHTML = h;
    bindPerson(body);
    document.getElementById('gfbsend').addEventListener('click', function () {
      var t = document.getElementById('gfbtext').value.trim();
      if (!t) { alert('請填寫回饋內容'); return; }
      var btn = this; btn.disabled = true; btn.textContent = '送出中…';
      api('postBulletin', { token: TOKEN, level: '小組', district: d.region, group: d.group, week: d.week, text: t })
        .then(function () { openGroup(GCUR.region, GCUR.group, d.week); })   // 重新載入單組頁，看到剛送的回饋
        .catch(function (e) { btn.disabled = false; btn.textContent = '送出回饋'; alert('送出失敗：' + e.message); });
    });
    document.getElementById('gdmsend').addEventListener('click', function () {
      var t = document.getElementById('gdmtext').value.trim();
      if (!t) { alert('請填寫私訊內容'); return; }
      var btn = this; btn.disabled = true; btn.textContent = '送出中…';
      api('postBulletin', { token: TOKEN, level: '小組私訊', district: d.region, group: d.group, week: d.week, text: t })
        .then(function () { openGroup(GCUR.region, GCUR.group, d.week); })   // 重新載入，看到剛送的私訊
        .catch(function (e) { btn.disabled = false; btn.textContent = '送出私訊'; alert('送出失敗：' + e.message); });
    });
    document.getElementById('gpage').scrollTop = 0;
  }

  function switchAccount() {
    if (window.google && google.accounts) google.accounts.id.disableAutoSelect();
    location.reload();
  }
</script>
<script src="https://accounts.google.com/gsi/client" onload="initGsi()" async defer></script>
</body>
</html>
