<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<base target="_top">
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    margin: 0; background: #e9ebef; color: #1f2328; font-size: 14px; }
  .wrap { max-width: 820px; margin: 0 auto; padding: 16px; }
  .head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 4px; }
  .head h1 { font-size: 20px; font-weight: 500; margin: 0; }
  .wk { font-size: 13px; color: #b5651d; background: #fbeed3; padding: 4px 12px; border-radius: 8px; }
  .note { font-size: 12px; color: #9a9a96; margin: 0 0 16px; }
  .cards2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .mcard { background: #fff; border-radius: 12px; padding: 16px 18px; }
  .mcard .lab { font-size: 13px; color: #6b6b6b; }
  .mcard .num { font-size: 34px; font-weight: 500; color: #E8852C; margin-top: 4px; }
  .mcard .num small { font-size: 15px; color: #9a9a96; }
  .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 12px; font-size: 12px; color: #6b6b6b; }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .dot { width: 11px; height: 11px; border-radius: 3px; display: inline-block; }
  .pies { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 22px; }
  .pie { background: #fff; border-radius: 12px; padding: 14px; }
  .pie .t { font-size: 13px; color: #6b6b6b; margin-bottom: 8px; }
  .pie .body { display: flex; align-items: center; gap: 12px; }
  .pie .leg { font-size: 12px; line-height: 1.9; }
  .sect { font-size: 16px; font-weight: 500; margin: 0 0 10px; }
  .sect i { color: #E8852C; margin-right: 6px; }
  .subnote { font-size: 12px; color: #9a9a96; margin: -6px 0 10px; }
  .grpgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .gblock { border-radius: 8px; overflow: hidden; border: 0.5px solid #e3e3e0; }
  .gblock .gh { color: #fff; font-size: 13px; padding: 6px 10px; }
  .gblock .gb { padding: 6px 10px; font-size: 13px; line-height: 2; }
  .adult { border-radius: 8px; overflow: hidden; border: 0.5px solid #e3e3e0; margin-bottom: 22px; }
  .warn { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 22px; }
  .wcol { border: 0.5px dashed #cfcfca; border-radius: 8px; padding: 10px 6px; }
  .wcol .wh { font-size: 12px; margin-bottom: 6px; text-align: center; }
  .wname { display: flex; align-items: center; justify-content: space-between; gap: 4px;
    background: #fbeed3; border-radius: 6px; padding: 4px 7px; margin-bottom: 5px; font-size: 12px; }
  .wname .claim { font-size: 11px; color: #b5651d; cursor: pointer; white-space: nowrap; }
  .wname .by { font-size: 11px; color: #1f7a3d; white-space: nowrap; }
  .empty { font-size: 13px; color: #9a9a96; text-align: center; }
  .rlabel { font-size: 13px; font-weight: 500; margin: 10px 0 6px; }
  .fb { border: 0.5px solid #e3e3e0; border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; background: #fff; }
  .fb .who { font-size: 13px; color: #6b6b6b; }
  .fb .txt { font-size: 14px; }
  .prgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .prcol { padding: 2px 0 2px 10px; }
  .prcol .rl { font-size: 13px; font-weight: 500; margin-bottom: 6px; }
  .prcol .pr { font-size: 13px; line-height: 1.7; margin-bottom: 5px; }
  .prcol .pr .g { color: #6b6b6b; }
  .center { text-align: center; color: #9a9a96; padding: 40px 16px; font-size: 15px; }
  .denied { max-width: 460px; margin: 60px auto; background: #fff; border-radius: 12px;
    padding: 28px; text-align: center; }
  .denied h2 { font-size: 18px; font-weight: 500; margin: 0 0 8px; }
  .denied p { font-size: 14px; color: #6b6b6b; margin: 4px 0; }
</style>
</head>
<body>
<div class="wrap">
  <div id="loading" class="center">讀取儀表板中…</div>
  <div id="app" style="display:none"></div>
</div>

<script>
  var COLORS = { '國中': '#378ADD', '高中': '#1D9E75', '大專': '#E8852C', '社青': '#7F77DD', '成人社青': '#C2557A' };
  var QC = ['國中', '高中', '大專', '社青'];

  google.script.run
    .withSuccessHandler(render)
    .withFailureHandler(function (e) {
      document.getElementById('loading').textContent = '讀取失敗：' + e.message;
    })
    .getDashboard();

  function esc(s) { return String(s == null ? '' : s).replace(/[&<>]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]; }); }

  function donut(total, segs) {
    var r = 34, circ = 2 * Math.PI * r, off = 0, s = '';
    segs.forEach(function (seg) {
      var len = total > 0 ? seg.value / total * circ : 0;
      s += '<circle cx="45" cy="45" r="' + r + '" fill="none" stroke="' + seg.color + '" stroke-width="14" stroke-dasharray="'
        + len.toFixed(1) + ' ' + (circ - len).toFixed(1) + '" stroke-dashoffset="' + (-off).toFixed(1) + '" transform="rotate(-90 45 45)"/>';
      off += len;
    });
    return '<svg viewBox="0 0 90 90" width="96" height="96" role="img" aria-label="各區人數圓餅圖">' + s
      + '<text x="45" y="42" text-anchor="middle" font-size="15" font-weight="500" fill="#1f2328">' + total + '</text>'
      + '<text x="45" y="55" text-anchor="middle" font-size="9" fill="#9a9a96">總人數</text></svg>';
  }

  function pieBlock(title, byRegion, total) {
    var segs = QC.map(function (d) { return { value: byRegion[d] || 0, color: COLORS[d] }; });
    var leg = QC.map(function (d) {
      var v = byRegion[d] || 0, pct = total > 0 ? Math.round(v / total * 100) : 0;
      return '<div><span style="color:' + COLORS[d] + '">●</span> ' + d + ' ' + v + '（' + pct + '%）</div>';
    }).join('');
    return '<div class="pie"><div class="t">' + title + '</div><div class="body">' + donut(total, segs)
      + '<div class="leg">' + leg + '</div></div></div>';
  }

  function render(d) {
    document.getElementById('loading').style.display = 'none';
    var app = document.getElementById('app');
    app.style.display = 'block';

    if (d.denied) {
      app.innerHTML = '<div class="denied"><h2>無權限查看</h2>'
        + '<p>這個儀表板僅開放給青崇傳道團隊。</p>'
        + '<p>你目前登入的帳號：' + esc(d.me || '（未取得）') + '</p>'
        + '<p style="margin-top:10px;color:#9a9a96">若應有權限，請確認用教會帳號登入，或請管理者把你的 email 加入白名單。</p></div>';
      return;
    }

    var h = '';
    h += '<div class="head"><h1>青崇牧養儀表板</h1><span class="wk">本週 ' + esc(d.week || '—') + '</span></div>';
    h += '<p class="note">青崇人數只含國中／高中／大專／社青；成人社青另計。已回報 ' + d.reported + ' 組。</p>';

    h += '<div class="cards2">'
      + '<div class="mcard"><div class="lab">青崇崇拜總人數</div><div class="num">' + d.worship.total + ' <small>人</small></div></div>'
      + '<div class="mcard"><div class="lab">小組出席總人數</div><div class="num">' + d.group.total + ' <small>人</small></div></div></div>';

    h += '<div class="legend">'
      + QC.concat(['成人社青']).map(function (r) {
        return '<span><span class="dot" style="background:' + COLORS[r] + '"></span>' + r + (r === '成人社青' ? '（另計）' : '') + '</span>';
      }).join('') + '</div>';

    h += '<div class="pies">'
      + pieBlock('青崇各區人數分佈', d.worship.byRegion, d.worship.total)
      + pieBlock('小組各區人數分佈', d.group.byRegion, d.group.total) + '</div>';

    h += '<p class="sect"><i class="ti ti-list-numbers"></i>當週各小組人數</p>';
    h += '<div class="grpgrid">';
    QC.forEach(function (r) {
      var list = d.perGroup[r] || [], sum = list.reduce(function (s, g) { return s + g.n; }, 0);
      var rows = list.length ? list.map(function (g) { return esc(g.group) + ' ' + g.n; }).join('　·　') : '尚無回報';
      h += '<div class="gblock"><div class="gh" style="background:' + COLORS[r] + '">' + r + '　' + sum + ' 人</div><div class="gb">' + rows + '</div></div>';
    });
    h += '</div>';
    var aList = d.adultGroups || [];
    var aRows = aList.length ? aList.map(function (g) { return esc(g.group) + ' ' + g.n; }).join('　·　') : '尚無回報';
    h += '<div class="adult"><div class="gh" style="background:' + COLORS['成人社青'] + ';color:#fff;font-size:13px;padding:6px 10px">成人社青　' + (d.adult.group || 0) + ' 人　<span style="opacity:.85">· 另計、不入青崇總數</span></div><div class="gb" style="padding:6px 10px;font-size:13px;line-height:2">' + aRows + '</div></div>';

    h += '<p class="sect"><i class="ti ti-alert-triangle"></i>警示名單 · 連續兩週缺席</p>';
    h += '<p class="subnote">小組連續 2 次「不明缺席」者。試跑首週資料未滿，第 2–3 週後出現。</p>';
    h += '<div class="warn">';
    QC.concat(['成人社青']).forEach(function (r) {
      var list = d.absentees[r] || [];
      var inner = list.length ? list.map(function (p) {
        var right = p.claimedBy ? '<span class="by">✓ ' + esc(p.claimedBy) + '</span>'
          : '<span class="claim" data-id="' + esc(p.id) + '" data-name="' + esc(p.name) + '">我來關心</span>';
        return '<div class="wname"><span>' + esc(p.name) + '</span>' + right + '</div>';
      }).join('') : '<div class="empty">—</div>';
      h += '<div class="wcol"><div class="wh" style="color:' + COLORS[r] + '">' + r + '</div>' + inner + '</div>';
    });
    h += '</div>';

    h += '<p class="sect"><i class="ti ti-message-2-heart"></i>小組近況與回饋</p>';
    QC.concat(['成人社青']).forEach(function (r) {
      var list = d.feedback[r] || [];
      if (!list.length) return;
      h += '<div class="rlabel" style="color:' + COLORS[r] + '">' + r + '</div>';
      list.forEach(function (f) {
        h += '<div class="fb"><span class="who">' + esc(f.group) + (f.leader ? ' · ' + esc(f.leader) : '') + '　</span><span class="txt">' + esc(f.text) + '</span></div>';
      });
    });

    h += '<p class="sect" style="margin-top:18px"><i class="ti ti-pray"></i>代禱事項 · 全部列出</p>';
    h += '<div class="prgrid">';
    QC.concat(['成人社青']).forEach(function (r) {
      var list = d.prayer[r] || [];
      var rows = list.length ? list.map(function (p) {
        return '<div class="pr"><span class="g">' + esc(p.group) + '：</span>' + esc(p.text) + '</div>';
      }).join('') : '<div class="pr" style="color:#9a9a96">尚無</div>';
      h += '<div class="prcol" style="border-left:3px solid ' + COLORS[r] + '"><div class="rl" style="color:' + COLORS[r] + '">' + r + '</div>' + rows + '</div>';
    });
    h += '</div>';

    app.innerHTML = h;

    var links = document.createElement('link');
    links.rel = 'stylesheet';
    links.href = 'https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2/tabler-icons.min.css';
    document.head.appendChild(links);

    document.querySelectorAll('.claim').forEach(function (b) {
      b.addEventListener('click', function () {
        var id = b.dataset.id, name = b.dataset.name;
        b.textContent = '認領中…';
        google.script.run.withSuccessHandler(function (res) {
          var span = document.createElement('span');
          span.className = 'by'; span.textContent = '✓ ' + res.by;
          b.parentNode.replaceChild(span, b);
        }).withFailureHandler(function (e) {
          b.textContent = '我來關心'; alert('認領失敗：' + e.message);
        }).claimCare(id, name);
      });
    });
  }
</script>
</body>
</html>
